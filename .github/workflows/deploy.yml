name: Deploy Full Ritual to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Cancel stuck Pages deployment
        env:
          GH_TOKEN: ${{ github.token }}
          STUCK_DEPLOYMENT_ID: 245e240d43203a15b4437a6c8a582e6d0b80ab03
        run: |
          status="$(
            curl -L -sS -o /tmp/pages-cancel-response.txt -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/deployments/${STUCK_DEPLOYMENT_ID}/cancel"
          )"

          if [ "$status" = "400" ] && grep -q "it's finished" /tmp/pages-cancel-response.txt; then
            status="204"
          fi

          if [ "$status" != "204" ] && [ "$status" != "404" ]; then
            cat /tmp/pages-cancel-response.txt
            exit 1
          fi

          sleep 10

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
